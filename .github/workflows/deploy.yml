name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel Project
        run: vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Set Environment Variables on Vercel
        run: |
          echo "https://kpzmwgcswpylghgorxyv.supabase.co" | vercel env add NEXT_PUBLIC_SUPABASE_URL production --yes || true
          echo "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwem13Z2Nzd3B5bGdoZ29yeHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTYzOTAsImV4cCI6MjA5MTA5MjM5MH0.grhIyb3Htk-CV89t8VUETHAGovGcgqd-UKzvmTc7QlU" | vercel env add NEXT_PUBLIC_SUPABASE_ANON_KEY production --yes || true
          echo "al-taryaqi-jwt-2024" | vercel env add JWT_SECRET production --yes || true
          echo "Al-Taryaqi" | vercel env add NEXT_PUBLIC_APP_NAME production --yes || true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Redeploy with Env Vars
        run: vercel --prod --yes --force
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
